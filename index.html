<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" id="search-form">
        <input type="search" placeholder="Enter City Name" id="search-input" required autocomplete="off">
        <br>
        <button id="search-button">Search</button>

    </form>
    <main id="app-container">
        <div id="location">
            <p>Mumbai</p>
        </div>
        <div id="temp">
            <img id="temp-icon" src="icons/thunderstorm.png" alt="">
            <p><span id="temp-value">31</span> <span id="temp-unit">&#176C</span></p>
        </div>
        <div id="climate">
            <p>Mostly sunny</p>
        </div>
    </main>
    <p id="footer">©Shubham Katwale 2022-2023</p>
    
    <script src="script.js"></script>
</body>
</html>
